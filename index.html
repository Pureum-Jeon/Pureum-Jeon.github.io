<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맨해튼 성 프란치스코 사목회 결재 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --border: #e0d9cf;
    --accent: #7a5c3a;
    --accent2: #c4a882;
    --text: #2c2416;
    --text2: #7a6e61;
    --approved: #2d7a4f;
    --rejected: #c0392b;
    --pending: #b07d2e;
    --processing: #2d5f8a;
    --approved-bg: #eaf5ef;
    --rejected-bg: #fdf0ef;
    --pending-bg: #fdf6e8;
    --processing-bg: #eaf0f8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 40px rgba(122,92,58,0.10);
  }

  .login-card .cross {
    text-align: center;
    font-size: 28px;
    margin-bottom: 8px;
  }

  .login-card h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .login-card p.sub {
    text-align: center;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 32px;
  }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: #faf9f7;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent2);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .err-msg {
    color: var(--rejected);
    font-size: 13px;
    margin-bottom: 12px;
    text-align: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    width: 100%;
    padding: 12px;
  }
  .btn-primary:hover { background: #5e4529; }
  .btn-outline {
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent2);
  }
  .btn-outline:hover { background: #faf5ee; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-approve { background: var(--approved); color: #fff; }
  .btn-approve:hover { background: #1f5f3a; }
  .btn-reject { background: var(--rejected); color: #fff; }
  .btn-reject:hover { background: #962d22; }
  .btn-danger { background: #c0392b; color: #fff; }
  .btn-danger:hover { background: #962d22; }

  /* ── MAIN APP ── */
  #app { display: none; min-height: 100vh; }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-user {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--text2);
  }
  .badge-admin {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 60px);
  }

  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 0;
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text2);
    padding: 0 20px;
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    font-size: 14px;
    color: var(--text2);
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .sidebar-item:hover { background: #faf5ee; color: var(--text); }
  .sidebar-item.active {
    background: #faf5ee;
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 600;
  }
  .sidebar-item .icon { width: 18px; text-align: center; }

  .main { padding: 28px; overflow-y: auto; }

  .page { display: none; }
  .page.active { display: block; }

  .page-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* ── STATS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .stat-card .num {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-card .lbl { font-size: 12px; color: var(--text2); }

  /* ── DOC LIST ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .doc-row {
    padding: 16px 20px;
    border-bottom: 1px solid #f0ece5;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .doc-row:last-child { border-bottom: none; }
  .doc-row:hover { background: #faf8f4; }

  .doc-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: #f3ede3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .doc-info { flex: 1; min-width: 0; }
  .doc-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-meta { font-size: 12px; color: var(--text2); }

  .status-badge {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .status-pending { background: var(--pending-bg); color: var(--pending); }
  .status-approved { background: var(--approved-bg); color: var(--approved); }
  .status-rejected { background: var(--rejected-bg); color: var(--rejected); }
  .status-processing { background: var(--processing-bg); color: var(--processing); }

  /* ── DOC DETAIL ── */
  .detail-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .detail-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .detail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 16px;
  }
  .detail-meta span strong { color: var(--text); }
  .detail-content {
    background: #faf8f4;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.7;
    margin-top: 12px;
  }

  .steps-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .steps-title {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 16px;
    color: var(--text2);
    letter-spacing: 0.03em;
  }
  .steps-list { display: flex; flex-direction: column; gap: 0; }
  .step-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid #f0ece5;
    position: relative;
  }
  .step-item:last-child { border-bottom: none; }
  .step-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    font-weight: 700;
  }
  .step-circle.approved { background: var(--approved-bg); color: var(--approved); }
  .step-circle.rejected { background: var(--rejected-bg); color: var(--rejected); }
  .step-circle.pending { background: #f0ece5; color: var(--text2); }
  .step-circle.current { background: var(--processing-bg); color: var(--processing); }

  .step-info { flex: 1; }
  .step-role { font-weight: 600; font-size: 14px; }
  .step-status { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .step-comment { font-size: 13px; color: var(--text); margin-top: 4px; font-style: italic; }
  .step-date { font-size: 12px; color: var(--text2); }

  .action-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .action-title { font-weight: 700; font-size: 14px; margin-bottom: 16px; }
  .action-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    margin-bottom: 16px;
    padding: 6px 0;
  }
  .back-btn:hover { color: var(--accent); }

  /* ── FORM ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    max-width: 600px;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* ── NOTIFICATION ── */
  .notif-item {
    display: flex;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid #f0ece5;
    cursor: pointer;
    transition: background 0.15s;
  }
  .notif-item:hover { background: #faf8f4; }
  .notif-item.unread { background: #fdf9f3; }
  .notif-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 5px;
    flex-shrink: 0;
  }
  .notif-text { font-size: 13px; line-height: 1.5; }
  .notif-date { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ── ADMIN ── */
  .user-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    border-bottom: 1px solid #f0ece5;
  }
  .user-row:last-child { border-bottom: none; }
  .user-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--accent2);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text2);
    font-size: 14px;
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }

  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text2);
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 9999;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 16px; }
    .form-row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="cross">✝️</div>
    <h1>맨해튼 성 프란치스코 한인 사목회 결재 시스템</h1>
    <p class="sub">한인 가톨릭 공동체</p>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="loginName" placeholder="이름을 입력하세요">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <p class="err-msg" id="loginErr"></p>
    <button class="btn btn-primary" onclick="doLogin()">로그인</button>
    <p style="font-size:11px;color:var(--text2);margin-top:16px;text-align:center;">
      초기 비밀번호: 1234 &nbsp;|&nbsp; 총무 비밀번호: admin123
    </p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-title">✝️ 맨해튼 성 프란치스코 한인 사목회 결재 시스템</div>
    <div class="header-user">
      <span id="headerName"></span>
      <span id="headerRole" style="color:var(--accent2);font-size:12px;"></span>
      <span id="headerAdmin" class="badge-admin" style="display:none;">총무</span>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-label">메뉴</div>
      <div class="sidebar-item active" onclick="showPage('dashboard')" id="nav-dashboard">
        <span class="icon">🏠</span> 대시보드
      </div>
      <div class="sidebar-item" onclick="showPage('docs')" id="nav-docs">
        <span class="icon">📄</span> 결재 문서함
      </div>
      <div class="sidebar-item" onclick="showPage('new')" id="nav-new">
        <span class="icon">✏️</span> 결재 신청
      </div>
      <div class="sidebar-item" onclick="showPage('notif')" id="nav-notif">
        <span class="icon">🔔</span> 알림
        <span id="notifBadge" style="margin-left:auto;background:var(--accent);color:#fff;font-size:11px;padding:1px 7px;border-radius:20px;display:none;"></span>
      </div>
      <div class="sidebar-item" onclick="showPage('admin')" id="nav-admin" style="display:none;">
        <span class="icon">⚙️</span> 관리자
      </div>
    </div>

    <div class="main">
      <!-- DASHBOARD -->
      <div class="page active" id="page-dashboard">
        <div class="page-title">대시보드</div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="card">
          <div class="card-header">📋 내 결재 대기 문서</div>
          <div id="myPendingList"></div>
        </div>
        <div class="card">
          <div class="card-header">🕐 최근 문서</div>
          <div id="recentList"></div>
        </div>
      </div>

      <!-- DOCS -->
      <div class="page" id="page-docs">
        <div class="page-title">결재 문서함</div>
        <div class="filter-bar" id="filterBar"></div>
        <div id="docsList"></div>
      </div>

      <!-- NEW -->
      <div class="page" id="page-new">
        <div class="page-title">결재 신청</div>
        <div class="form-card">
          <div class="form-group">
            <label>문서 종류</label>
            <select id="docType">
              <option value="예산 및 결산서">예산 및 결산서</option>
              <option value="지출보고서">지출보고서</option>
              <option value="지출요청서">지출요청서</option>
              <option value="행사 계획 보고서">행사 계획 보고서</option>
            </select>
          </div>
          <div class="form-group">
            <label>제목</label>
            <input type="text" id="docTitle" placeholder="문서 제목">
          </div>
          <div class="form-group">
            <label>내용</label>
            <textarea id="docContent" placeholder="결재 내용을 작성해주세요"></textarea>
          </div>
          <button class="btn btn-primary" onclick="submitDoc()">결재 신청</button>
        </div>
      </div>

      <!-- NOTIF -->
      <div class="page" id="page-notif">
        <div class="page-title">알림</div>
        <div class="card">
          <div id="notifList"></div>
        </div>
      </div>

      <!-- ADMIN -->
      <div class="page" id="page-admin">
        <div class="page-title">관리자 페이지</div>
        <div class="card" style="margin-bottom:20px;">
          <div class="card-header">👥 사목위원 목록</div>
          <div id="userList"></div>
        </div>
        <div class="card">
          <div class="card-header">🗑️ 문서 관리</div>
          <div id="adminDocList"></div>
        </div>
      </div>

      <!-- DETAIL -->
      <div class="page" id="page-detail">
        <div class="back-btn" onclick="goBack()">← 목록으로</div>
        <div id="detailContent"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="actionModal">
  <div class="modal">
    <h3 id="modalTitle">결재 처리</h3>
    <div class="form-group">
      <label>의견 (선택사항)</label>
      <textarea id="modalComment" placeholder="의견을 남겨주세요" style="min-height:70px;"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn" id="modalConfirmBtn" onclick="confirmAction()">확인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const USERS = [
  { id:1, name:'이웅희 루카', role:'지도 신부', pw:'1234', isAdmin:false },
  { id:2, name:'전푸름 세레나', role:'총무', pw:'1234', isAdmin:true },
  { id:3, name:'장철순 스테파노', role:'사목회장',    pw:'1234', isAdmin:false },
  { id:4, name:'정다경 마리아', role:'재정분과장', pw:'1234', isAdmin:false },
  { id:5, name:'최병은 루치아', role:'분과장',  pw:'1234', isAdmin:false },
  { id:6, name:'김승연 안나',role:'분과장', pw:'1234', isAdmin:false },
  { id:7, name:'이경철 가브리엘',    role:'분과장',     pw:'1234', isAdmin:false },
];
const APPROVAL_LINE = ['분과장','재정분과장','사목회장','지도 신부'];

let docs = [
  {
    id:1, title:'3월 행사 지출 요청', type:'지출요청서',
    content:'3월 부활절 행사 관련 제반 비용 지출 요청드립니다.',
    author:1, authorName:'김민준', createdAt:'2026-04-10',
    attachments:[],
    steps: APPROVAL_LINE.map((role,i) => ({
      role, status: i<2?'approved': i===2?'pending':'pending',
      comment: i===0?'확인했습니다.':'',
      date: i===0?'2026-04-11': i===1?'2026-04-12':null
    }))
  },
  {
    id:2, title:'4월 예산 및 결산서', type:'예산 및 결산서',
    content:'4월 분과 활동 예산 계획을 보고드립니다.',
    author:2, authorName:'이서연', createdAt:'2026-04-13',
    attachments:[],
    steps: APPROVAL_LINE.map(role => ({role, status:'pending', comment:'', date:null}))
  }
];

let docIdCounter = 3;
let currentUser = null;
let currentPage = 'dashboard';
let prevPage = 'docs';
let filterStatus = 'all';
let pendingAction = null; // {docId, action}

// ── STATUS ──
function getDocStatus(doc) {
  if (doc.steps.every(s=>s.status==='approved')) return 'approved';
  if (doc.steps.some(s=>s.status==='rejected')) return 'rejected';
  if (doc.steps.some(s=>s.status==='approved')) return 'processing';
  return 'pending';
}
function getCurrentStep(doc) {
  return doc.steps.findIndex(s=>s.status==='pending');
}
const STATUS_LABEL = {pending:'대기',approved:'승인',rejected:'반려',processing:'결재중'};
const DOC_ICON = {'예산 및 결산서':'📊','지출보고서':'🧾','지출요청서':'💸','행사 계획 보고서':'📅'};

// ── NOTIFICATIONS ──
function getNotifs() {
  const notifs = {};
  USERS.forEach(u => notifs[u.id] = []);
  docs.forEach(doc => {
    const curStep = getCurrentStep(doc);
    if (curStep >= 0) {
      const approverRole = doc.steps[curStep].role;
      const approver = USERS.find(u => u.role === approverRole);
      if (approver) notifs[approver.id].push({docId:doc.id, msg:`[${doc.type}] "${doc.title}" 결재 요청`, date:doc.createdAt, read:false});
    }
    doc.steps.forEach(step => {
      if (step.status==='approved'||step.status==='rejected') {
        const author = USERS.find(u=>u.id===doc.author);
        if (author) notifs[author.id].push({docId:doc.id, msg:`"${doc.title}" ${step.role}이(가) ${step.status==='approved'?'승인':'반려'}했습니다.`, date:step.date, read:true});
      }
    });
  });
  return notifs;
}

// ── LOGIN ──
function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const pw = document.getElementById('loginPw').value;
  const user = USERS.find(u => u.name===name && u.pw===pw);
  if (!user) { document.getElementById('loginErr').textContent = '이름 또는 비밀번호가 올바르지 않습니다.'; return; }
  currentUser = user;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('headerName').textContent = user.name;
  document.getElementById('headerRole').textContent = user.role;
  if (user.isAdmin) {
    document.getElementById('headerAdmin').style.display = 'inline';
    document.getElementById('nav-admin').style.display = 'flex';
  }
  showPage('dashboard');
}

function doLogout() {
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginName').value = '';
  document.getElementById('loginPw').value = '';
  document.getElementById('loginErr').textContent = '';
}

// ── NAVIGATION ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if (document.getElementById('nav-'+name)) document.getElementById('nav-'+name).classList.add('active');
  currentPage = name;
  if (name==='dashboard') renderDashboard();
  if (name==='docs') renderDocs();
  if (name==='notif') renderNotif();
  if (name==='admin') renderAdmin();
  updateNotifBadge();
}

function goBack() { showPage(prevPage); }

// ── DASHBOARD ──
function renderDashboard() {
  const myDocs = docs.filter(d=>d.author===currentUser.id);
  const myApprove = docs.filter(d=>{
    const cur = getCurrentStep(d);
    return cur>=0 && d.steps[cur].role===currentUser.role;
  });
  const total = docs.length;
  const approved = docs.filter(d=>getDocStatus(d)==='approved').length;
  const pending = docs.filter(d=>getDocStatus(d)==='pending'||getDocStatus(d)==='processing').length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">전체 문서</div></div>
    <div class="stat-card"><div class="num">${myDocs.length}</div><div class="lbl">내 문서</div></div>
    <div class="stat-card"><div class="num">${approved}</div><div class="lbl">승인 완료</div></div>
    <div class="stat-card"><div class="num">${pending}</div><div class="lbl">진행 중</div></div>
  `;

  const myPendingList = document.getElementById('myPendingList');
  if (myApprove.length===0) {
    myPendingList.innerHTML = '<div class="empty-state"><div class="icon">✅</div>결재 대기 문서가 없습니다.</div>';
  } else {
    myPendingList.innerHTML = myApprove.map(d=>docRowHTML(d)).join('');
  }

  const recent = [...docs].sort((a,b)=>b.id-a.id).slice(0,5);
  document.getElementById('recentList').innerHTML = recent.length===0
    ? '<div class="empty-state"><div class="icon">📭</div>문서가 없습니다.</div>'
    : recent.map(d=>docRowHTML(d)).join('');
}

// ── DOCS ──
function renderDocs() {
  const filters = [
    {key:'all',label:'전체'},
    {key:'pending',label:'대기'},
    {key:'processing',label:'결재중'},
    {key:'approved',label:'승인'},
    {key:'rejected',label:'반려'},
  ];
  document.getElementById('filterBar').innerHTML = filters.map(f=>`
    <button class="filter-btn ${filterStatus===f.key?'active':''}" onclick="setFilter('${f.key}')">${f.label}</button>
  `).join('');

  let filtered = filterStatus==='all' ? docs : docs.filter(d=>getDocStatus(d)===filterStatus);
  document.getElementById('docsList').innerHTML = filtered.length===0
    ? '<div class="empty-state" style="background:#fff;border-radius:12px;"><div class="icon">📭</div>문서가 없습니다.</div>'
    : filtered.map(d=>docRowHTML(d)).join('');
}

function setFilter(key) { filterStatus=key; renderDocs(); }

function docRowHTML(doc) {
  const status = getDocStatus(doc);
  const cur = getCurrentStep(doc);
  const waitingRole = cur>=0 ? ` · ${doc.steps[cur].role} 결재 대기` : '';
  return `<div class="doc-row" onclick="openDoc(${doc.id})">
    <div class="doc-icon">${DOC_ICON[doc.type]||'📄'}</div>
    <div class="doc-info">
      <div class="doc-title">${doc.title}</div>
      <div class="doc-meta">${doc.type} · ${doc.authorName} · ${doc.createdAt}${waitingRole}</div>
    </div>
    <span class="status-badge status-${status}">${STATUS_LABEL[status]}</span>
  </div>`;
}

// ── DETAIL ──
function openDoc(docId) {
  prevPage = currentPage;
  const doc = docs.find(d=>d.id===docId);
  if (!doc) return;
  const status = getDocStatus(doc);
  const curStep = getCurrentStep(doc);
  const canApprove = curStep>=0 && doc.steps[curStep].role===currentUser.role;
  const isAuthor = doc.author===currentUser.id;
  const isAdmin = currentUser.isAdmin;

  let stepsHTML = doc.steps.map((step,i)=>{
    let cls = step.status;
    if (step.status==='pending' && i===curStep) cls='current';
    const icon = step.status==='approved'?'✓': step.status==='rejected'?'✗': i===curStep?'●':'○';
    return `<div class="step-item">
      <div class="step-circle ${cls}">${icon}</div>
      <div class="step-info">
        <div class="step-role">${step.role}</div>
        <div class="step-status">${STATUS_LABEL[step.status]||'대기'} ${step.date?`· ${step.date}`:''}</div>
        ${step.comment?`<div class="step-comment">"${step.comment}"</div>`:''}
      </div>
    </div>`;
  }).join('');

  let actionHTML = '';
  if (canApprove) {
    actionHTML = `<div class="action-card">
      <div class="action-title">✍️ 결재 처리</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px;">현재 귀하(${currentUser.role})의 결재가 필요합니다.</p>
      <div class="action-btns">
        <button class="btn btn-approve" onclick="openModal(${docId},'approve')">✔ 승인</button>
        <button class="btn btn-reject" onclick="openModal(${docId},'reject')">✖ 반려</button>
      </div>
    </div>`;
  }

  let deleteHTML = '';
  if (isAdmin || isAuthor) {
    deleteHTML = `<div style="margin-top:8px;">
      <button class="btn btn-danger btn-sm" onclick="deleteDoc(${docId})">🗑 문서 삭제</button>
    </div>`;
  }

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-header">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
        <span class="status-badge status-${status}">${STATUS_LABEL[status]}</span>
        <span style="font-size:12px;color:var(--text2);">${doc.type}</span>
      </div>
      <div class="detail-title">${doc.title}</div>
      <div class="detail-meta">
        <span>작성자: <strong>${doc.authorName}</strong></span>
        <span>작성일: <strong>${doc.createdAt}</strong></span>
      </div>
      <div class="detail-content">${doc.content}</div>
      ${deleteHTML}
    </div>
    <div class="steps-card">
      <div class="steps-title">결재선</div>
      <div class="steps-list">${stepsHTML}</div>
    </div>
    ${actionHTML}
  `;
  showPage('detail');
}

// ── MODAL ──
function openModal(docId, action) {
  pendingAction = {docId, action};
  document.getElementById('modalTitle').textContent = action==='approve'?'✔ 승인':'✖ 반려';
  const btn = document.getElementById('modalConfirmBtn');
  btn.className = 'btn ' + (action==='approve'?'btn-approve':'btn-reject');
  btn.textContent = action==='approve'?'승인':'반려';
  document.getElementById('modalComment').value = '';
  document.getElementById('actionModal').classList.add('open');
}
function closeModal() {
  document.getElementById('actionModal').classList.remove('open');
  pendingAction = null;
}
function confirmAction() {
  if (!pendingAction) return;
  const {docId, action} = pendingAction;
  const comment = document.getElementById('modalComment').value.trim();
  processDoc(docId, action, comment);
  closeModal();
}

// ── PROCESS ──
function processDoc(docId, action, comment) {
  const doc = docs.find(d=>d.id===docId);
  if (!doc) return;
  const curStep = getCurrentStep(doc);
  if (curStep<0) return;
  const step = doc.steps[curStep];
  step.status = action==='approve'?'approved':'rejected';
  step.comment = comment;
  step.date = new Date().toISOString().slice(0,10);
  showToast(action==='approve'?'✅ 승인했습니다.':'❌ 반려했습니다.');
  openDoc(docId);
  updateNotifBadge();
}

// ── SUBMIT ──
function submitDoc() {
  const type = document.getElementById('docType').value;
  const title = document.getElementById('docTitle').value.trim();
  const content = document.getElementById('docContent').value.trim();
  if (!title||!content) { showToast('제목과 내용을 입력해주세요.'); return; }
  const newDoc = {
    id: docIdCounter++,
    title, type, content,
    author: currentUser.id,
    authorName: currentUser.name,
    createdAt: new Date().toISOString().slice(0,10),
    attachments: [],
    steps: APPROVAL_LINE.map(role=>({role, status:'pending', comment:'', date:null}))
  };
  docs.unshift(newDoc);
  document.getElementById('docTitle').value = '';
  document.getElementById('docContent').value = '';
  showToast('✅ 결재 신청이 완료되었습니다.');
  showPage('docs');
}

// ── DELETE ──
function deleteDoc(docId) {
  if (!confirm('문서를 삭제하시겠습니까?')) return;
  docs = docs.filter(d=>d.id!==docId);
  showToast('🗑 삭제되었습니다.');
  showPage(prevPage);
}

// ── NOTIF ──
function renderNotif() {
  const notifs = getNotifs();
  const myNotifs = notifs[currentUser.id]||[];
  if (myNotifs.length===0) {
    document.getElementById('notifList').innerHTML = '<div class="empty-state"><div class="icon">🔔</div>알림이 없습니다.</div>';
    return;
  }
  document.getElementById('notifList').innerHTML = myNotifs.map(n=>`
    <div class="notif-item ${n.read?'':'unread'}" onclick="openDoc(${n.docId})">
      ${!n.read?'<div class="notif-dot"></div>':'<div style="width:8px;flex-shrink:0;"></div>'}
      <div>
        <div class="notif-text">${n.msg}</div>
        <div class="notif-date">${n.date||''}</div>
      </div>
    </div>
  `).join('');
}

function updateNotifBadge() {
  if (!currentUser) return;
  const notifs = getNotifs();
  const myNotifs = (notifs[currentUser.id]||[]).filter(n=>!n.read);
  const badge = document.getElementById('notifBadge');
  if (myNotifs.length>0) {
    badge.style.display='inline';
    badge.textContent=myNotifs.length;
  } else {
    badge.style.display='none';
  }
}

// ── ADMIN ──
function renderAdmin() {
  document.getElementById('userList').innerHTML = USERS.map(u=>`
    <div class="user-row">
      <div class="user-avatar">${u.name[0]}</div>
      <div style="flex:1;">
        <div style="font-weight:600;font-size:14px;">${u.name}</div>
        <div style="font-size:12px;color:var(--text2);">${u.role}</div>
      </div>
      ${u.isAdmin?'<span class="badge-admin">총무</span>':''}
    </div>
  `).join('');

  document.getElementById('adminDocList').innerHTML = docs.length===0
    ? '<div class="empty-state">문서가 없습니다.</div>'
    : docs.map(d=>`
      <div class="doc-row" onclick="openDoc(${d.id})">
        <div class="doc-icon">${DOC_ICON[d.type]||'📄'}</div>
        <div class="doc-info">
          <div class="doc-title">${d.title}</div>
          <div class="doc-meta">${d.authorName} · ${d.createdAt}</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteDoc(${d.id})">삭제</button>
      </div>
    `).join('');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
